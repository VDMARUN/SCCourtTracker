name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Download Gradle wrapper
      run: |
        curl -L "https://services.gradle.org/distributions/gradle-8.1-bin.zip" -o /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /tmp/gradle
        export PATH="/tmp/gradle/gradle-8.1/bin:$PATH"
        echo "GRADLE_HOME=/tmp/gradle/gradle-8.1" >> $GITHUB_ENV
        echo "/tmp/gradle/gradle-8.1/bin" >> $GITHUB_PATH

    - name: Build Debug APK
      run: gradle assembleDebug --stacktrace --no-daemon
      env:
        ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SC-Court-Tracker-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
